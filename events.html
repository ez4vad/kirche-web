<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Все события | Philadelphia</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/events.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <img src="images/logo.png" alt="Philadelphia">
  </div>

  <button class="burger" id="burgerBtn">☰</button>

  <nav class="mobile-menu" id="mobileMenu">
    <a href="index.html">Главная</a>
    <a href="about.html">О нас</a>
    <a href="services.html">Служения</a>
    <a href="events.html">События</a>
    <a href="contacts.html">Контакты</a>
  </nav>
</header>

<main class="events-page">

  <section class="events-page-hero">
    <p class="about-label">Календарь</p>
    <h1>Все события</h1>
    <p>Смотрите расписание богослужений, встреч и мероприятий церкви.</p>
  </section>

  <section class="full-calendar-section">

    <div class="calendar-header">
      <button id="prevMonth">‹</button>
      <h2 id="calendarTitle">Июль 2026</h2>
      <button id="nextMonth">›</button>
    </div>

    <div class="week-days">
      <span>Пн</span>
      <span>Вт</span>
      <span>Ср</span>
      <span>Чт</span>
      <span>Пт</span>
      <span>Сб</span>
      <span>Вс</span>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>

    <div class="calendar-events-title">
        <br>
      <h2>События на выбранный день</h2>
    </div>

    <div class="events-list calendar-events-list" id="calendarEventsList"></div>

  </section>

</main>

<script src="js/events.js"></script>
</body>
</html>
